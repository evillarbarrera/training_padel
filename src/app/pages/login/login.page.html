<ion-content class="login-content">
  <div class="fixed-bg"></div>

  <div class="login-wrapper">
    <!-- Unified Login Card with integrated logo -->
    <div class="login-card">
      <!-- Logo integrado en la parte superior del card -->
      <div class="logo-container">
        <div class="logo-ring">
          <img src="assets/logo-circular.png" class="brand-logo" alt="PadelManager" />
        </div>
      </div>

      <!-- Brand Name -->
      <h1 class="brand-name">Padel<span>Manager</span></h1>
      <p class="brand-tagline">Tu academia, tu ritmo</p>

      <!-- Divider -->
      <div class="divider"></div>

      <!-- Form -->
      <div class="form-section">
        <div class="input-group">
          <div class="input-field">
            <ion-icon name="mail-outline"></ion-icon>
            <ion-input type="email" placeholder="Correo electrónico" [(ngModel)]="usuario" mode="md"></ion-input>
          </div>

          <div class="input-field">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <ion-input type="password" placeholder="Contraseña" [(ngModel)]="password" mode="md"></ion-input>
          </div>
        </div>

        <div class="options-row">
          <ion-checkbox [(ngModel)]="recordar" justify="start" labelPlacement="end">Recordar</ion-checkbox>
        </div>

        <ion-button expand="block" class="login-btn" (click)="login()" [disabled]="isLoading">
          <ion-spinner name="crescent" *ngIf="isLoading"></ion-spinner>
          <span *ngIf="!isLoading">Entrar</span>
        </ion-button>

        <!-- Error Message Display -->
        <div *ngIf="error" class="error-msg-container">
          <ion-icon name="alert-circle-outline"></ion-icon>
          <span>{{ error }}</span>
        </div>
      </div>

      <!-- Footer -->
      <p class="register-link">
        ¿No tienes cuenta? <span (click)="goToRegister()">Regístrate</span>
      </p>
    </div>
  </div>
</ion-content>
