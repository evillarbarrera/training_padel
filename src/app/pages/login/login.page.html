<ion-content class="nike-content">
  <div class="fixed-bg"></div>

  <div class="center-wrapper">
    <!-- Hero Branding -->
    <div class="hero-section">
      <img src="assets/pelota.png" class="brand-logo" alt="PadelManager Logo" />
    </div>

    <!-- Form Container -->
    <div class="form-wrapper animate-up">
      <div class="nike-card">
        <h2 class="login-header">Bienvenido</h2>
        <p class="login-sub">Inicia sesión para continuar</p>

        <div class="input-group">
          <ion-item lines="none" class="nike-item">
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <ion-input type="email" placeholder="Correo electrónico" [(ngModel)]="usuario" mode="md"></ion-input>
          </ion-item>

          <ion-item lines="none" class="nike-item">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input type="password" placeholder="Contraseña" [(ngModel)]="password" mode="md"></ion-input>
          </ion-item>
        </div>

        <div class="options-group">
          <ion-checkbox [(ngModel)]="recordar" justify="start" labelPlacement="end">Recordar credenciales</ion-checkbox>
        </div>

        <ion-button expand="block" class="nike-button main-btn" (click)="login()" [disabled]="isLoading">
          <ion-spinner name="crescent" *ngIf="isLoading"></ion-spinner>
          <span *ngIf="!isLoading">Entrar</span>
        </ion-button>

        <p class="footer-text">

          ¿No tienes cuenta? <span class="link" (click)="goToRegister()">Regístrate</span>
        </p>
      </div>
    </div>
  </div>
</ion-content>
