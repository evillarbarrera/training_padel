<ion-content class="login-content">
  <div class="fixed-bg"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <!-- Logo integrado -->
      <div class="logo-container">
        <div class="logo-ring">
          <img src="assets/logo-circular.png" class="brand-logo" alt="PadelManager" />
        </div>
      </div>

      <!-- Brand Name -->
      <h1 class="brand-name">Padel<span>Manager</span></h1>
      <p class="brand-tagline">Crea tu cuenta</p>

      <!-- Divider -->
      <div class="divider"></div>

      <!-- Form -->
      <div class="form-section">
        <div class="input-group">
          <div class="input-field">
            <ion-icon name="person-outline"></ion-icon>
            <ion-input type="text" placeholder="Nombre completo" [(ngModel)]="nombre"></ion-input>
          </div>

          <div class="input-field">
            <ion-icon name="mail-outline"></ion-icon>
            <ion-input type="email" placeholder="Correo electrónico" [(ngModel)]="email"></ion-input>
          </div>

          <div class="input-field">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <ion-input type="password" placeholder="Contraseña" [(ngModel)]="password"></ion-input>
          </div>

          <div class="input-field">
            <ion-icon name="shield-checkmark-outline"></ion-icon>
            <ion-select placeholder="Selecciona tu rol" [(ngModel)]="rol" interface="popover">
              <ion-select-option value="jugador">Jugador</ion-select-option>
              <ion-select-option value="entrenador">Entrenador</ion-select-option>
            </ion-select>
          </div>
        </div>

        <ion-button expand="block" class="login-btn" (click)="register()">
          Registrarme
        </ion-button>
      </div>

      <!-- Footer -->
      <p class="register-link">
        ¿Ya tienes cuenta? <span (click)="goToLogin()">Inicia Sesión</span>
      </p>
    </div>
  </div>
</ion-content>
